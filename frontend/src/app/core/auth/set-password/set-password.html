<div class="login-bg">
  <div class="slab-shell">

    <div class="psa-label">
      <div class="grade-badge">
        <span class="grade-badge__num">10</span>
        <span class="grade-badge__text">GEM MT</span>
      </div>
      <div class="psa-info">
        <span class="psa-info__title">CARD VAULT</span>
        <span class="psa-info__subtitle">SET YOUR PASSWORD</span>
        <span class="psa-info__cert">CERT# 2026-CVT-AUTH-001</span>
      </div>
      <div class="psa-logo">PSA</div>
    </div>

    <div class="card-window">
      <div class="watermark" aria-hidden="true">AUTHENTICATED</div>

      <div class="cv-icon">
        <div class="cv-icon__shimmer" aria-hidden="true"></div>
        <span class="cv-icon__text">CV</span>
      </div>

      <h1 class="text-xl font-bold text-white mt-3 tracking-wide">Set Password</h1>
      <p class="text-zinc-500 text-xs mt-1 tracking-widest uppercase">Choose a new password</p>

      <div class="form-area">
        <form (ngSubmit)="save()" class="flex flex-col gap-3">
          <div class="flex flex-col gap-1.5">
            <label for="password" class="text-xs text-zinc-400 tracking-wide uppercase">New Password</label>
            <input
              pInputText
              id="password"
              type="password"
              [(ngModel)]="password"
              name="password"
              placeholder="Min. 8 characters"
              autocomplete="new-password"
              required
              class="email-input"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="confirm" class="text-xs text-zinc-400 tracking-wide uppercase">Confirm Password</label>
            <input
              pInputText
              id="confirm"
              type="password"
              [(ngModel)]="confirm"
              name="confirm"
              placeholder="Repeat password"
              autocomplete="new-password"
              required
              class="email-input"
            />
          </div>

          <button
            type="submit"
            class="magic-btn"
            [disabled]="!password || !confirm || state() === 'saving'"
          >
            <i [class]="state() === 'saving' ? 'pi pi-spin pi-spinner' : 'pi pi-lock'"></i>
            {{ state() === 'saving' ? 'Saving…' : 'Set Password' }}
          </button>
        </form>

        @if (state() === 'error') {
          <p class="flex items-center gap-2 text-red-400 text-xs justify-center mt-2">
            <i class="pi pi-exclamation-triangle"></i>
            {{ errorMessage() }}
          </p>
        }
      </div>
    </div>

  </div>
</div>
