<div class="flex flex-col gap-5 px-4 pt-6 pb-4">

  <!-- Search Bar -->
  <div class="flex gap-2">
    <div class="relative flex-1">
      <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
      <input
        pInputText
        type="text"
        placeholder="Player, set, year, grade…"
        class="w-full pl-9 pr-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        [ngModel]="query()"
        (ngModelChange)="query.set($event)"
        (keyup.enter)="search()"
      />
    </div>
    <p-button icon="pi pi-camera" severity="secondary" [rounded]="true" [outlined]="true"
              pTooltip="Image search" tooltipPosition="left" />
    <p-button icon="pi pi-search" (onClick)="search()" [rounded]="true" />
  </div>

  <!-- Results -->
  @if (hasSearched()) {
    <div>
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-gray-700">Results</h2>
        <span class="text-xs text-gray-400">{{ results().length }} sold</span>
      </div>
      <div class="flex flex-col gap-3">
        @for (result of results(); track result.soldDate + result.price) {
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
            <div class="flex items-start justify-between gap-3">
              <p class="text-sm font-semibold text-gray-900 flex-1 leading-snug">{{ result.title }}</p>
              <span class="text-base font-bold text-gray-900 shrink-0">${{ result.price | number:'1.2-2' }}</span>
            </div>
            <div class="flex items-center gap-2 mt-2">
              <p-tag [value]="result.condition" severity="secondary" styleClass="text-[10px]!" />
              <span class="text-xs text-gray-400">Sold {{ result.soldDate }}</span>
            </div>
            <div class="flex gap-2 mt-3">
              <p-button label="Add to Collection" size="small" [outlined]="true"
                        styleClass="flex-1 text-xs!" (onClick)="addToCollection(result)" />
              <p-button label="Wishlist" icon="pi pi-heart" size="small" severity="secondary"
                        [outlined]="true" styleClass="text-xs!" (onClick)="addToWishlist(result)" />
            </div>
          </div>
        }
      </div>
    </div>
  }

  <!-- Recent Lookups -->
  <div>
    <h2 class="text-sm font-semibold text-gray-700 mb-3">Recent Lookups</h2>
    <div class="flex flex-col gap-2">
      @for (entry of history(); track entry.timestamp) {
        <button
          class="flex items-center gap-3 bg-white rounded-xl border border-gray-100 px-4 py-3 text-left w-full hover:bg-gray-50 transition-colors"
          (click)="query.set(entry.query); search()">
          <i class="pi pi-history text-gray-300 text-sm"></i>
          <span class="flex-1 text-sm text-gray-700 truncate">{{ entry.query }}</span>
          <span class="text-xs font-bold text-gray-500 shrink-0">${{ entry.topPrice | number }}</span>
          <i class="pi pi-arrow-up-right text-gray-300 text-xs"></i>
        </button>
      }
    </div>
  </div>

</div>
