<div class="flex flex-col gap-5 px-4 pt-6 pb-4">


  <!-- Items -->
  <div class="flex flex-col gap-3">
    @for (item of items(); track item.id) {
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">

        <!-- Top row -->
        <div class="flex items-start justify-between gap-2">
          <div class="flex-1 min-w-0">
            <p class="text-sm font-bold text-gray-900 truncate">{{ item.player }}</p>
            <p class="text-xs text-gray-400 truncate">{{ item.year }} {{ item.set }} · {{ item.parallel }}</p>
          </div>
          <p-tag
            [value]="statusLabel[item.alertStatus]"
            [severity]="statusSeverity[item.alertStatus]"
            styleClass="text-[10px]! shrink-0"
          />
        </div>

        <!-- Price info -->
        <div class="flex items-center gap-4 mt-3 pt-3 border-t border-gray-50">
          <div class="flex-1">
            <p class="text-[10px] text-gray-400 uppercase tracking-wide">Target</p>
            <p class="text-sm font-bold text-[#800020]">${{ item.targetPrice | number }}</p>
          </div>
          <div class="flex-1">
            <p class="text-[10px] text-gray-400 uppercase tracking-wide">Last Seen</p>
            @if (item.lastSeenPrice) {
              <p class="text-sm font-bold"
                 [class]="item.lastSeenPrice <= item.targetPrice ? 'text-emerald-500' : 'text-gray-700'">
                ${{ item.lastSeenPrice | number }}
              </p>
            } @else {
              <p class="text-sm text-gray-300">—</p>
            }
          </div>
          <div class="flex-1">
            <p class="text-[10px] text-gray-400 uppercase tracking-wide">Grade</p>
            <p class="text-sm font-semibold text-gray-700">{{ item.grade }}</p>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-2 mt-3">
          <p-button icon="pi pi-search" label="Search Comps" size="small" [outlined]="true"
                    severity="secondary" styleClass="flex-1 text-xs!" />
          <p-button icon="pi pi-trash" size="small" severity="danger" [outlined]="true"
                    styleClass="text-xs!" (onClick)="removeItem(item.id)" />
        </div>

      </div>
    }
  </div>

</div>
